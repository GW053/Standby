<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7dfbd">
  <title>陪伴小屋</title>
  <style>
    :root {
      --ink: #5f3e31;
      --ink-soft: #9c6f61;
      --wall: #fff0cf;
      --wall-deep: #f8d88c;
      --floor: #eec07d;
      --floor-line: rgba(122, 80, 56, .22);
      --mint: #9fd6b1;
      --blue: #9dccd9;
      --pink: #f5b8c8;
      --rose: #c97893;
      --orange: #ed9f52;
      --cream: #fff9e8;
      --card: rgba(255, 251, 238, .94);
      --shadow: 0 16px 36px rgba(76, 48, 31, .16);
      --line: 2px solid rgba(95, 62, 49, .78);
      --char-x: 47%;
      --char-y: 56%;
      --char-scale: 1;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-width: 320px;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fbebd1;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    .app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 10px;
      width: 100%;
      height: 100dvh;
      padding: calc(10px + var(--safe-top)) 10px calc(10px + var(--safe-bottom));
      background:
        linear-gradient(180deg, rgba(255, 245, 222, .92), rgba(251, 226, 190, .96)),
        radial-gradient(circle at 20% 8%, rgba(255, 255, 255, .75), transparent 30%);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      min-height: 54px;
      padding: 8px 10px;
      border: var(--line);
      border-radius: 16px;
      background: var(--card);
      box-shadow: 0 8px 18px rgba(76, 48, 31, .08);
    }

    .title strong {
      display: block;
      font-size: 18px;
      letter-spacing: .04em;
    }

    .title span,
    .hud-chip span,
    .small-note {
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 700;
    }

    .hud-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .hud-chip {
      display: grid;
      place-items: center;
      min-width: 58px;
      min-height: 36px;
      padding: 4px 8px;
      border: var(--line);
      border-radius: 12px;
      background: #fff;
      font-weight: 900;
      line-height: 1.1;
      box-shadow: inset 0 -4px 0 rgba(238, 192, 125, .18);
    }

    .scene-wrap {
      position: relative;
      min-height: 0;
      border: var(--line);
      border-radius: 22px;
      overflow: hidden;
      background: #fff7db;
      box-shadow: var(--shadow);
      touch-action: manipulation;
    }

    .room {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, var(--wall) 0 57%, var(--floor) 57% 100%);
    }

    .room::before {
      position: absolute;
      right: -14%;
      bottom: -18%;
      width: 86%;
      height: 54%;
      border-radius: 50%;
      background: rgba(255, 255, 255, .18);
      content: "";
    }

    .wainscot {
      position: absolute;
      left: 0;
      right: 0;
      top: 48%;
      height: 10%;
      border-top: var(--line);
      border-bottom: var(--line);
      background:
        repeating-linear-gradient(90deg, transparent 0 34px, rgba(95, 62, 49, .14) 35px 37px),
        #cdebc2;
      opacity: .9;
    }

    .floor-grid {
      position: absolute;
      left: -20%;
      right: -20%;
      bottom: -10%;
      height: 44%;
      transform: perspective(460px) rotateX(58deg);
      transform-origin: bottom center;
      background:
        repeating-linear-gradient(90deg, transparent 0 58px, var(--floor-line) 59px 61px),
        repeating-linear-gradient(0deg, transparent 0 46px, var(--floor-line) 47px 49px);
    }

    .scallop {
      position: absolute;
      left: -6%;
      top: -3px;
      width: 112%;
      height: 28px;
      background:
        radial-gradient(circle at 20px 0, transparent 20px, var(--pink) 21px 23px, transparent 24px) 0 0 / 48px 28px repeat-x,
        #ffe6ef;
      border-bottom: var(--line);
      opacity: .72;
    }

    .window {
      position: absolute;
      left: 36%;
      top: 9%;
      width: 31%;
      height: 34%;
      border: 4px solid #875f3f;
      border-radius: 14px 14px 10px 10px;
      background:
        radial-gradient(circle at 68% 20%, #fff7ab 0 7px, transparent 8px),
        linear-gradient(180deg, #bde8f0 0 56%, #a6d17e 56% 100%);
      box-shadow: inset 0 0 0 4px rgba(255, 252, 229, .72);
    }

    .window::before,
    .window::after {
      position: absolute;
      background: #875f3f;
      content: "";
    }

    .window::before {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 4px;
      transform: translateX(-50%);
    }

    .window::after {
      left: 0;
      right: 0;
      top: 50%;
      height: 4px;
      transform: translateY(-50%);
    }

    .curtain {
      position: absolute;
      top: 7%;
      width: 8%;
      height: 34%;
      border: var(--line);
      border-radius: 14px 14px 28px 28px;
      background:
        repeating-linear-gradient(90deg, rgba(117, 184, 200, .25) 0 7px, transparent 8px 16px),
        #fff8e6;
      z-index: 1;
    }

    .curtain.left { left: 31%; transform: rotate(2deg); }
    .curtain.right { left: 64%; transform: rotate(-2deg); }

    .door {
      position: absolute;
      left: 4%;
      top: 23%;
      width: 16%;
      height: 35%;
      border: var(--line);
      border-radius: 34px 34px 8px 8px;
      background: #ffd6e4;
      box-shadow: inset 0 0 0 8px rgba(255, 255, 255, .28);
    }

    .door::before {
      position: absolute;
      right: 18%;
      top: 50%;
      width: 11px;
      height: 11px;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: #fff2a6;
      content: "";
    }

    .door::after {
      position: absolute;
      left: 18%;
      top: -14px;
      width: 64%;
      height: 24px;
      border: var(--line);
      border-bottom: 0;
      border-radius: 24px 24px 0 0;
      background: #fff;
      content: "";
    }

    .bed {
      position: absolute;
      left: 22%;
      top: 45%;
      width: 35%;
      height: 23%;
      border: var(--line);
      border-radius: 26px 26px 18px 18px;
      background: #fff7e8;
      box-shadow: inset 0 -14px 0 rgba(239, 162, 92, .16), 0 12px 0 rgba(95, 62, 49, .09);
      z-index: 2;
    }

    .bed::before {
      position: absolute;
      left: 8%;
      top: -22%;
      width: 28%;
      height: 34%;
      border: var(--line);
      border-radius: 14px;
      background: #ffbf7c;
      transform: rotate(-6deg);
      content: "";
    }

    .bed::after {
      position: absolute;
      right: 9%;
      top: -18%;
      width: 25%;
      height: 32%;
      border: var(--line);
      border-radius: 14px;
      background: #ffd76f;
      transform: rotate(7deg);
      content: "";
    }

    .blanket {
      position: absolute;
      left: 12%;
      right: 7%;
      bottom: 7%;
      height: 42%;
      border: var(--line);
      border-radius: 22px;
      background:
        repeating-linear-gradient(135deg, transparent 0 14px, rgba(255, 255, 255, .36) 15px 25px),
        #f5c6c8;
    }

    .desk {
      position: absolute;
      right: 5%;
      top: 43%;
      width: 28%;
      height: 18%;
      border: var(--line);
      border-radius: 12px;
      background: #d49b5b;
      z-index: 2;
    }

    .desk::before,
    .desk::after {
      position: absolute;
      bottom: -41%;
      width: 12%;
      height: 42%;
      border: var(--line);
      border-radius: 0 0 8px 8px;
      background: #b77e4e;
      content: "";
    }

    .desk::before { left: 10%; }
    .desk::after { right: 10%; }

    .desk-top {
      position: absolute;
      left: 5%;
      right: 5%;
      top: 14%;
      height: 24%;
      border: var(--line);
      border-radius: 10px;
      background: #fff6d8;
    }

    .lamp {
      position: absolute;
      right: 12%;
      top: 20%;
      width: 8%;
      height: 24%;
      z-index: 1;
    }

    .lamp::before {
      position: absolute;
      left: 32%;
      bottom: 0;
      width: 8px;
      height: 58%;
      border-radius: 8px;
      background: var(--ink);
      content: "";
    }

    .lamp::after {
      position: absolute;
      right: 0;
      top: 4%;
      width: 50px;
      height: 33px;
      border: var(--line);
      border-radius: 28px 28px 8px 8px;
      background: #ff9b62;
      box-shadow: 0 12px 24px rgba(255, 190, 82, .5);
      content: "";
    }

    .shelf {
      position: absolute;
      left: 20%;
      top: 17%;
      width: 13%;
      height: 23%;
      border: var(--line);
      border-radius: 12px;
      background:
        linear-gradient(180deg, transparent 44%, var(--ink) 45% 48%, transparent 49%),
        #ffd985;
      z-index: 1;
    }

    .shelf span,
    .tiny-book {
      position: absolute;
      bottom: 10%;
      width: 11%;
      height: 34%;
      border: 2px solid var(--ink);
      border-radius: 3px;
      background: #80c0b3;
    }

    .shelf span:nth-child(1) { left: 15%; background: #ee7f75; }
    .shelf span:nth-child(2) { left: 30%; background: #6db0d1; height: 42%; }
    .shelf span:nth-child(3) { left: 47%; background: #f7f0ad; }
    .shelf span:nth-child(4) { left: 67%; background: #89c878; height: 39%; }

    .plant {
      position: absolute;
      right: 4%;
      bottom: 8%;
      width: 15%;
      height: 22%;
      z-index: 4;
      pointer-events: none;
    }

    .pot {
      position: absolute;
      left: 26%;
      bottom: 0;
      width: 45%;
      height: 30%;
      border: var(--line);
      border-radius: 0 0 16px 16px;
      background: #d8835c;
    }

    .leaf {
      position: absolute;
      width: 38%;
      height: 26%;
      border: var(--line);
      border-radius: 50% 4px 50% 4px;
      background: #69b36b;
    }

    .leaf.a { left: 12%; top: 26%; transform: rotate(-25deg); }
    .leaf.b { left: 44%; top: 14%; transform: rotate(28deg); }
    .leaf.c { left: 34%; top: 38%; transform: rotate(8deg); }
    .leaf.d { left: 58%; top: 34%; transform: rotate(38deg); }
    .leaf.e { left: 18%; top: 48%; transform: rotate(-52deg); }

    .rug {
      position: absolute;
      left: 31%;
      bottom: 6%;
      width: 38%;
      height: 23%;
      border: var(--line);
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(255, 255, 255, .5) 0 24%, transparent 25%),
        repeating-radial-gradient(ellipse at center, transparent 0 18px, rgba(255, 255, 255, .35) 20px 27px),
        #ffd986;
      z-index: 1;
    }

    .tea-table {
      position: absolute;
      left: 38%;
      bottom: 17%;
      width: 22%;
      height: 11%;
      border: var(--line);
      border-radius: 50%;
      background: #c9854f;
      z-index: 3;
    }

    .tea-table::before,
    .tea-table::after {
      position: absolute;
      bottom: -28%;
      width: 12%;
      height: 33%;
      border: 2px solid var(--ink);
      border-radius: 6px;
      background: #a76c44;
      content: "";
    }

    .tea-table::before { left: 18%; }
    .tea-table::after { right: 18%; }

    .plate {
      position: absolute;
      top: 28%;
      width: 16%;
      height: 24%;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: #fff;
    }

    .plate.one { left: 18%; }
    .plate.two { left: 43%; }
    .plate.three { right: 18%; }

    .door-mat {
      position: absolute;
      left: 5%;
      bottom: 12%;
      width: 16%;
      height: 9%;
      border: var(--line);
      border-radius: 50%;
      background: #b6dbd1;
      z-index: 2;
    }

    .wall-dots {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 14% 17%, rgba(201, 120, 147, .22) 0 5px, transparent 6px),
        radial-gradient(circle at 75% 14%, rgba(201, 120, 147, .2) 0 4px, transparent 5px),
        radial-gradient(circle at 87% 31%, rgba(201, 120, 147, .18) 0 4px, transparent 5px),
        radial-gradient(circle at 28% 47%, rgba(255, 255, 255, .38) 0 7px, transparent 8px);
      pointer-events: none;
    }

    .outdoor-hint {
      position: absolute;
      left: 2%;
      right: 2%;
      bottom: -36%;
      height: 35%;
      border-top: var(--line);
      background:
        radial-gradient(ellipse at 22% 62%, rgba(89, 161, 95, .18) 0 14%, transparent 15%),
        repeating-linear-gradient(12deg, transparent 0 30px, rgba(77, 145, 67, .18) 32px 35px),
        #cbe992;
      transition: bottom .55s ease;
      z-index: 0;
    }

    .scene-wrap.outdoor .outdoor-hint {
      bottom: 0;
    }

    .scene-wrap.outdoor .door {
      transform: rotateY(-22deg);
      transform-origin: left center;
      background: #f7bdcf;
    }

    .scene-wrap.outdoor .room {
      background:
        linear-gradient(180deg, #d7f0f4 0 43%, var(--wall) 43% 57%, var(--floor) 57% 100%);
    }

    .scene-wrap.water .window {
      background:
        linear-gradient(180deg, #b9eef4 0 50%, #8ed4e4 50% 100%);
    }

    .avatar {
      position: absolute;
      left: var(--char-x);
      top: var(--char-y);
      width: 84px;
      height: 112px;
      transform: translate(-50%, -50%) scale(var(--char-scale));
      transform-origin: center bottom;
      transition:
        left 1.15s cubic-bezier(.22, .9, .32, 1),
        top 1.15s cubic-bezier(.22, .9, .32, 1),
        transform 1.15s cubic-bezier(.22, .9, .32, 1);
      z-index: 5;
      filter: drop-shadow(0 12px 10px rgba(80, 52, 38, .18));
    }

    .bunny-sprite {
      position: absolute;
      left: 50%;
      bottom: 0;
      display: block;
      width: 100%;
      height: auto;
      transform: translateX(-50%);
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .avatar.walking {
      animation: tinyWalk .72s ease-in-out 2;
    }

    .avatar::after {
      position: absolute;
      left: 17%;
      right: 17%;
      bottom: -6px;
      height: 10px;
      border-radius: 50%;
      background: rgba(92, 61, 43, .18);
      content: "";
    }

    .head {
      position: absolute;
      left: 50%;
      top: 0;
      width: 72px;
      height: 66px;
      transform: translateX(-50%);
      border: var(--line);
      border-radius: 45% 45% 43% 43%;
      background:
        radial-gradient(circle at 24% 62%, #ffb8b6 0 6px, transparent 7px),
        radial-gradient(circle at 76% 62%, #ffb8b6 0 6px, transparent 7px),
        #fff8df;
      z-index: 3;
    }

    .hair {
      position: absolute;
      left: 50%;
      top: -4px;
      width: 76px;
      height: 44px;
      transform: translateX(-50%);
      border: var(--line);
      border-bottom: 0;
      border-radius: 44px 44px 20px 20px;
      background: #8a5a44;
      z-index: 4;
    }

    .ear {
      position: absolute;
      top: 25px;
      width: 17px;
      height: 20px;
      border: var(--line);
      border-radius: 50%;
      background: #fff3d8;
      z-index: 2;
    }

    .ear.left { left: -3px; }
    .ear.right { right: -3px; }

    .eye {
      position: absolute;
      top: 34px;
      width: 6px;
      height: 14px;
      border-radius: 50%;
      background: #2f2522;
      z-index: 5;
    }

    .eye.left { left: 28px; }
    .eye.right { right: 28px; }

    .mouth {
      position: absolute;
      left: 50%;
      top: 50px;
      width: 16px;
      height: 8px;
      transform: translateX(-50%);
      border-bottom: 2px solid #7b5148;
      border-radius: 50%;
      z-index: 5;
    }

    .body {
      position: absolute;
      left: 50%;
      top: 58px;
      width: 45px;
      height: 46px;
      transform: translateX(-50%);
      border: var(--line);
      border-radius: 18px 18px 14px 14px;
      background: #9ecad3;
      z-index: 2;
    }

    .arm,
    .leg {
      position: absolute;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #fff3d8;
      z-index: 1;
      transition: transform .35s ease, left .35s ease, right .35s ease, top .35s ease;
    }

    .arm {
      top: 64px;
      width: 14px;
      height: 36px;
    }

    .arm.left { left: 15px; transform: rotate(18deg); }
    .arm.right { right: 15px; transform: rotate(-18deg); }

    .leg {
      top: 96px;
      width: 16px;
      height: 31px;
      background: #ffe4c8;
    }

    .leg.left { left: 29px; transform: rotate(8deg); }
    .leg.right { right: 29px; transform: rotate(-8deg); }

    .avatar.pose-read,
    .avatar.pose-draw,
    .avatar.pose-study,
    .avatar.pose-cook {
      --char-scale: .95;
    }

    .avatar.pose-read .arm.left,
    .avatar.pose-study .arm.left,
    .avatar.pose-draw .arm.left {
      left: 18px;
      transform: rotate(72deg);
    }

    .avatar.pose-read .arm.right,
    .avatar.pose-study .arm.right,
    .avatar.pose-draw .arm.right {
      right: 18px;
      transform: rotate(-72deg);
    }

    .avatar.pose-sleep {
      --char-scale: .98;
      transform: translate(-50%, -50%) scale(var(--char-scale)) rotate(-78deg);
    }

    .avatar.pose-sleep .eye {
      height: 2px;
      top: 40px;
    }

    .avatar.pose-sleep .mouth {
      width: 9px;
      height: 9px;
      border: 2px solid #7b5148;
      border-top: 0;
    }

    .avatar.pose-exercise .arm.left,
    .avatar.pose-run .arm.left {
      transform: rotate(-62deg);
      top: 60px;
    }

    .avatar.pose-exercise .arm.right,
    .avatar.pose-run .arm.right {
      transform: rotate(62deg);
      top: 60px;
    }

    .avatar.pose-run .leg.left {
      transform: rotate(-35deg);
    }

    .avatar.pose-run .leg.right {
      transform: rotate(35deg);
    }

    .avatar.pose-shy .arm.left,
    .avatar.pose-shy .arm.right {
      top: 70px;
      height: 24px;
    }

    .avatar.pose-shy .arm.left {
      left: 26px;
      transform: rotate(112deg);
    }

    .avatar.pose-shy .arm.right {
      right: 26px;
      transform: rotate(-112deg);
    }

    .avatar.pose-hygiene .arm.right {
      right: 20px;
      top: 54px;
      transform: rotate(-122deg);
    }

    .prop {
      position: absolute;
      display: none;
      z-index: 8;
      pointer-events: none;
    }

    .prop.book {
      left: 50%;
      top: 73px;
      width: 54px;
      height: 32px;
      transform: translateX(-50%);
      border: var(--line);
      border-radius: 4px 4px 10px 10px;
      background:
        linear-gradient(90deg, #fff 0 48%, var(--ink) 49% 52%, #fff7cc 53% 100%);
    }

    .prop.bowl {
      left: 50%;
      top: 82px;
      width: 42px;
      height: 24px;
      transform: translateX(-50%);
      border: var(--line);
      border-radius: 0 0 24px 24px;
      background: #fff;
    }

    .prop.brush {
      right: 2px;
      top: 44px;
      width: 28px;
      height: 9px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #b5e3ef;
      transform: rotate(-28deg);
    }

    .prop.paper {
      left: 16px;
      top: 78px;
      width: 58px;
      height: 36px;
      border: var(--line);
      border-radius: 5px;
      background:
        linear-gradient(135deg, transparent 0 55%, rgba(237, 159, 82, .45) 56% 59%, transparent 60%),
        #fff;
      transform: rotate(-4deg);
    }

    .prop.dumbbell {
      left: 50%;
      top: 85px;
      width: 58px;
      height: 12px;
      transform: translateX(-50%) rotate(-10deg);
      background:
        linear-gradient(90deg, var(--ink) 0 18%, #fff 19% 82%, var(--ink) 83% 100%);
      border-radius: 999px;
    }

    .prop.bike {
      left: -30px;
      top: 58px;
      width: 90px;
      height: 48px;
    }

    .prop.bike::before,
    .prop.bike::after {
      position: absolute;
      bottom: 0;
      width: 30px;
      height: 30px;
      border: 4px solid var(--ink);
      border-radius: 50%;
      background: transparent;
      content: "";
    }

    .prop.bike::before { left: 0; }
    .prop.bike::after { right: 0; }

    .prop.bike span {
      position: absolute;
      left: 24px;
      top: 21px;
      width: 42px;
      height: 4px;
      border-radius: 999px;
      background: var(--ink);
      transform: rotate(-18deg);
    }

    .prop.swim {
      left: 52%;
      top: 71px;
      width: 42px;
      height: 18px;
      transform: translateX(-50%);
      border: 3px solid var(--ink);
      border-radius: 999px;

      height: 20px;

    /* Animated action stage. GIFs are generated bitmap assets, so the old

        linear-gradient(180deg, rgba(255, 250, 239, .94), rgba(249, 226, 191, .94));

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function ensureToday() {
      const key = todayKey();
      if (!state.days[key]) {
        state.days[key] = {
          date: key,
          minutes: 0,
          rounds: 0,
          starts: 0,
          coins: 0,
          actions: {},
          levelUps: [],
          summary: "她还在等今天的第一段陪伴。"
        };
      }
      return state.days[key];
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        const saved = raw ? JSON.parse(raw) : {};
        const base = defaultState();
        const merged = {
          ...base,
          ...saved,
          stats: { ...base.stats, ...(saved.stats || {}) },
          skills: { ...base.skills, ...(saved.skills || {}) },
          days: saved.days || {},
          owned: Array.isArray(saved.owned) ? saved.owned : [],
          recentActions: Array.isArray(saved.recentActions) ? saved.recentActions : [],
          recentGroups: Array.isArray(saved.recentGroups) ? saved.recentGroups : []
        };
        skillMeta.forEach(([id]) => {
          merged.skills[id] = { level: Math.max(1, +(merged.skills[id]?.level || 1)), xp: Math.max(0, +(merged.skills[id]?.xp || 0)) };
        });
        return merged;
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function formatTime(ms) {
      const s = Math.max(0, Math.ceil(ms / 1000));
      const m = String(Math.floor(s / 60)).padStart(2, "0");
      const sec = String(s % 60).padStart(2, "0");
      return `${m}:${sec}`;
    }

    function formatMinutes(minutes) {
      if (minutes < 60) return `${minutes} 分钟`;
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return m ? `${h} 小时 ${m} 分钟` : `${h} 小时`;
    }

    function xpNeed(level) {
      return 20 + level * level * 6;
    }

    function clamp(v) {
      return Math.max(0, Math.min(100, Math.round(v)));
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function beginRound(countStart = true, line) {
      const day = ensureToday();
      if (countStart) day.starts += 1;
      state.activeStart = Date.now();
      state.interrupted = false;
      state.line = line || pick([...actionById(state.currentAction).lines, ...softLines]);
      saveState();
      render();
    }

    function availableActions() {
      return actions.filter(action => !action.item || state.owned.includes(action.item));
    }

    function weightedAction(action) {
      const st = state.stats;
      let w = action.weight || 5;
      if (action.group === "meal") w += st.satiety < 30 ? 36 : st.satiety < 50 ? 14 : -4;
      if (action.group === "drink") w += st.satiety < 45 ? 8 : 1;
      if (action.group === "sleep") w += st.energy < 22 ? 42 : st.energy < 42 ? 18 : -8;
      if (action.group === "rest-light") w += st.energy < 35 ? 22 : -3;
      if (action.group === "hygiene") w += st.cleanliness < 35 ? 36 : st.cleanliness < 55 ? 14 : -3;
      if (["quiet", "music"].includes(action.group)) w += st.mood < 42 ? 18 : 3;
      if (["study", "reading"].includes(action.group)) w += st.focus > 58 ? 10 : st.energy < 35 ? -12 : 2;
      if (["art", "craft", "photo"].includes(action.group)) w += st.inspiration > 58 ? 10 : 2;
      if (action.scene === "outdoor") w += st.energy > 48 && st.cleanliness > 30 ? 8 : -8;
      if (state.recentActions.includes(action.id)) w *= .22;
      if (state.recentGroups.includes(action.group)) w *= .42;
      if (state.lastAction === action.id) w = 0;
      return Math.max(.5, w);
    }

    function chooseNextAction() {
      let list = availableActions().filter(action => action.id !== state.lastAction);
      const last = state.recentGroups[0];
      if (last) {
        const filtered = list.filter(action => action.group !== last);
        if (filtered.length > 8) list = filtered;
      }
      if (last === "sleep" || last === "rest-light") {
        const noRest = list.filter(action => !["sleep", "rest-light"].includes(action.group));
        if (noRest.length && state.stats.energy > 20) list = noRest;
      }
      if (last === "meal" && state.stats.satiety > 25) {
        const noMeal = list.filter(action => action.group !== "meal");
        if (noMeal.length) list = noMeal;
      }
      const weighted = list.map(action => ({ action, weight: weightedAction(action) }));
      const sum = weighted.reduce((acc, item) => acc + item.weight, 0);
      let cursor = Math.random() * sum;
      for (const item of weighted) {
        cursor -= item.weight;
        if (cursor <= 0) return item.action;
      }
      return weighted[0]?.action || actions[0];
    }

    function addXp(skillId, xp, levelUps) {
      if (!skillId || !xp) return;
      const s = state.skills[skillId];
      s.xp += xp;
      while (s.xp >= xpNeed(s.level)) {
        s.xp -= xpNeed(s.level);
        s.level += 1;
        const name = skillMeta.find(([id]) => id === skillId)?.[1] || skillId;
        levelUps.push(`${name} Lv.${s.level}`);
      }
    }

    function completeRound() {
      const action = actionById(state.currentAction);
      const day = ensureToday();
      const levelUps = [];
      const decay = { satiety:-7, energy:-4, cleanliness:-4, mood:-1, focus:-2, inspiration:-1 };
      Object.keys(state.stats).forEach(key => {
        state.stats[key] = clamp(state.stats[key] + (decay[key] || 0) + (action.effects?.[key] || 0));
      });
      addXp(action.skill, action.xp, levelUps);
      const bonus = (day.rounds + 1) % 3 === 0 ? 6 : 0;
      const first = day.rounds === 0 ? 12 : 0;
      const coins = 12 + bonus + first;
      state.gold += coins;
      state.totalMinutes += ROUND_MINUTES;
      state.totalRounds += 1;
      day.minutes += ROUND_MINUTES;
      day.rounds += 1;
      day.coins += coins;
      day.actions[action.id] = (day.actions[action.id] || 0) + 1;
      day.levelUps.push(...levelUps);
      state.lastAction = action.id;
      state.recentActions = [action.id, ...state.recentActions.filter(id => id !== action.id)].slice(0, 6);
      state.recentGroups = [action.group, ...state.recentGroups.filter(g => g !== action.group)].slice(0, 5);
      const next = chooseNextAction();
      state.currentAction = next.id;
      const doneLine = pick(action.after);
      const nextLine = Math.random() > .5 ? `下一轮我想去「${next.name}」，你还陪我吗？` : pick(softLines);
      const upLine = levelUps.length ? ` 还有，${levelUps.join("、")} 了。` : "";
      day.summary = buildSummary(day, action.name);
      state.line = `${doneLine} ${nextLine}${upLine}`;
      beginRound(false, state.line);
    }

    function buildSummary(day, actionName) {
      const names = Object.entries(day.actions)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 4)
        .map(([id]) => actionById(id).name);
      return `她刚刚完成了「${actionName}」。今天主要做了：${names.join("、") || actionName}。`;
    }

    function interrupt() {
      if (interruptTimer) {
        clearTimeout(interruptTimer);
        interruptTimer = null;
      }
      awayStartedAt = null;
      if (Date.now() < ignoreBlurUntil) return;
      if (noticeOpen || !state.activeStart) return;
      state.activeStart = null;
      state.interrupted = true;
      state.line = "你刚刚不见了，我就停下来了。没关系，回来就继续。";
      saveState();
      noticeOpen = true;
      els.modal.classList.add("show");
      render();
    }

    function scheduleInterrupt() {
      if (Date.now() < ignoreBlurUntil) return;
      if (noticeOpen || !state.activeStart || interruptTimer) return;
      awayStartedAt = Date.now();
      state.line = "我先等你一下，五秒内回来就继续算。";
      render();
      interruptTimer = setTimeout(() => {
        interruptTimer = null;
        interrupt();
      }, INTERRUPT_GRACE_MS);
    }

    function cancelInterrupt() {
      if (!interruptTimer) return;
      clearTimeout(interruptTimer);
      interruptTimer = null;
      awayStartedAt = null;
      const action = actionById(state.currentAction);
      state.line = Math.random() > .45 ? "回来了？好险，我差点就停下来了。" : pick(action.lines);
      saveState();
      render();
    }

    function chooseAfterInterrupt() {
      const previous = state.currentAction;
      const previousAction = actionById(previous);
      state.lastAction = previous;
      state.recentActions = [previous, ...state.recentActions.filter(id => id !== previous)].slice(0, 6);
      state.recentGroups = [previousAction.group, ...state.recentGroups.filter(g => g !== previousAction.group)].slice(0, 5);
      let next = chooseNextAction();
      const choices = availableActions().filter(action => action.id !== previous);
      if (next.id === previous && choices.length && Math.random() < .86) {
        next = pick(choices);
      }
      state.currentAction = next.id;
      return next;
    }

    function buy(item) {
      if (state.owned.includes(item.id)) return;
      if (state.gold < item.price) {
        showToast("金币还不够，再陪她几轮。");
        return;
      }
      state.gold -= item.price;
      state.owned.push(item.id);
      state.line = `买了「${item.name}」。她小声说：这个我会好好用的。`;
      saveState();
      showToast(`已解锁：${item.name}`);
      render();
    }

    function render() {
      const now = Date.now();
      const action = actionById(state.currentAction);
      const day = ensureToday();
      const elapsed = state.activeStart ? now - state.activeStart : 0;
      const remaining = ROUND_MS - elapsed;
      const progress = state.activeStart ? Math.min(100, elapsed / ROUND_MS * 100) : 0;
      const gameDay = Math.floor(state.totalMinutes / (DAY_ROUNDS * ROUND_MINUTES)) + 1;
      const part = Math.floor((state.totalMinutes % (DAY_ROUNDS * ROUND_MINUTES)) / ROUND_MINUTES) + 1;
      if (lastRenderedAction !== action.id) {
        lastRenderedAction = action.id;
        const gif = gifForAction(action);
        if (els.actionGif) {
          els.actionGif.src = gif;
          els.actionGif.alt = `${action.name}动图`;
        }
      }

      els.statusText.textContent = state.activeStart ? "挂机中" : "等你";
      els.timerText.textContent = state.activeStart ? formatTime(remaining) : "10:00";
      els.goldText.textContent = state.gold;
      els.ageText.textContent = `第 ${gameDay} 天 · 第 ${part}/${DAY_ROUNDS} 段`;
      els.actionLabel.textContent = `现在：${action.name}`;
      els.lineText.textContent = state.line;
      els.currentActionName.textContent = action.name;
      els.currentActionNote.textContent = action.scene === "outdoor" ? "她慢慢出门活动，偶尔回头看你还在不在。" : "她把动作放慢一点，像是在等你一起陪着。";
      els.roundFill.style.width = `${progress}%`;
      els.todayMinutes.textContent = formatMinutes(day.minutes);
      els.todayStarts.textContent = day.starts;

      els.scene.classList.toggle("outdoor", action.scene === "outdoor");
      els.scene.classList.toggle("water", action.scene === "water");

      renderStats();
      renderSkills();
      renderShop();
      renderReview();
    }

    function renderStats() {
      els.statsGrid.innerHTML = statMeta.map(([id, name, low, high]) => {
        const value = state.stats[id];
        const stateClass = value < 35 ? "low" : value > 72 ? "high" : "";
        return `<div class="stat ${stateClass}">
          <div class="stat-head"><span>${name}</span><b>${value}</b></div>
          <div class="mini-bar"><span style="width:${value}%"></span></div>
          <span class="hint">${value < 42 ? low : high}</span>
        </div>`;
      }).join("");
    }

    function renderSkills() {
      els.skillsGrid.innerHTML = skillMeta.map(([id, name]) => {
        const skill = state.skills[id];
        const need = xpNeed(skill.level);
        const width = Math.min(100, skill.xp / need * 100);
        return `<div class="skill">
          <div class="skill-head"><span>${name} Lv.${skill.level}</span><b>${skill.xp}/${need}</b></div>
          <div class="mini-bar"><span style="width:${width}%"></span></div>
          <span class="hint">相关行动完成后会涨经验，等级越高越慢。</span>
        </div>`;
      }).join("");
    }

    function renderShop() {
      els.shopGrid.innerHTML = shopItems.map(item => {
        const owned = state.owned.includes(item.id);
        const canBuy = state.gold >= item.price;
        const tags = item.unlock.map(id => `<span class="tag">${actionById(id).name}</span>`).join("");
        return `<article class="shop-card">
          <div><strong>${item.name}</strong><p>${item.desc}</p></div>
          <div class="tags">${tags}</div>
          <button class="buy" data-buy="${item.id}" ${owned || !canBuy ? "disabled" : ""}>${owned ? "已拥有" : item.price + " 金币"}</button>
        </article>`;
      }).join("");
      els.shopGrid.querySelectorAll("[data-buy]").forEach(button => {
        button.addEventListener("click", () => {
          const item = shopItems.find(it => it.id === button.dataset.buy);
          if (item) buy(item);
        });
      });
    }

    function renderReview() {
      const days = Object.values(state.days).sort((a, b) => b.date.localeCompare(a.date));
      els.reviewList.innerHTML = days.length ? days.map(day => {
        const ups = day.levelUps.slice(-3).map(x => `<span class="tag">${x}</span>`).join("");
        return `<article class="review-card">
          <strong>${day.date} · ${formatMinutes(day.minutes)}</strong>
          <p>${day.summary}</p>
          <div class="tags" style="margin-top:8px;">
            <span class="tag">完成 ${day.rounds} 轮</span>
            <span class="tag">开始 ${day.starts} 次</span>
            <span class="tag">金币 +${day.coins}</span>
            ${ups}
          </div>
        </article>`;
      }).join("") : `<article class="review-card"><strong>还没有回顾</strong><p>先陪她完成一个十分钟吧。</p></article>`;
    }

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    async function requestWakeLock() {
      try {
        ignoreBlurUntil = Date.now() + 1800;
        if (!("wakeLock" in navigator)) {
          showToast("这个浏览器不支持亮屏锁。");
          return;
        }
        wakeLock = await navigator.wakeLock.request("screen");
        els.wakeButton.textContent = "亮屏中";
        showToast("已尽量保持屏幕常亮。");
        wakeLock.addEventListener("release", () => {
          wakeLock = null;
          els.wakeButton.textContent = "亮屏";
        });
      } catch {
        showToast("亮屏请求被浏览器拦住了。");
      }
    }

    document.querySelectorAll(".tabs button").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tabs button").forEach(btn => btn.classList.toggle("active", btn === button));
        document.querySelectorAll(".panel").forEach(panel => panel.classList.remove("active"));
        document.getElementById(`panel-${button.dataset.tab}`).classList.add("active");
      });
    });

    els.closeModal.addEventListener("click", () => {
      ignoreBlurUntil = Date.now() + 1200;
      noticeOpen = false;
      els.modal.classList.remove("show");
      const next = chooseAfterInterrupt();
      beginRound(true, `你回来了。那我先去「${next.name}」，这次别走太远。`);
    });

    els.wakeButton.addEventListener("click", requestWakeLock);

    els.fullscreenButton.addEventListener("click", async () => {
      try {
        ignoreBlurUntil = Date.now() + 1800;
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
          showToast("已进入全屏。");
        } else {
          await document.exitFullscreen();
        }
      } catch {
        showToast("这个浏览器不允许全屏。");
      }
    });

    els.resetButton.addEventListener("click", () => {
      ignoreBlurUntil = Date.now() + 1200;
      if (!confirm("确定要清空本地存档吗？")) return;
      state = defaultState();
      beginRound(true, "新的存档开始了。你坐好，我也坐好。");
      showToast("存档已重置。");
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        scheduleInterrupt();
      } else {
        cancelInterrupt();
        if (wakeLock === null && els.wakeButton.textContent === "亮屏中") requestWakeLock();
      }
    });

    window.addEventListener("blur", () => {
      setTimeout(() => {
        if (!document.hasFocus()) scheduleInterrupt();
      }, 120);
    });

    window.addEventListener("focus", cancelInterrupt);

    window.addEventListener("pagehide", () => {
      if (state.activeStart) {
        state.pendingAwayAt = Date.now();
        saveState();
      }
    });

    setInterval(() => {
      const now = Date.now();
      if (now - lastTick > 1000) lastTick = now;
      if (state.activeStart && now - state.activeStart >= ROUND_MS) {
        completeRound();
        return;
      }
      render();
    }, 500);

    setInterval(() => {
      if (!state.activeStart || noticeOpen) return;
      const action = actionById(state.currentAction);
      state.line = Math.random() > .45 ? pick(action.lines) : pick(softLines);
      saveState();
      render();
    }, 26000);

    ensureToday();
    if (state.pendingAwayAt && state.activeStart && Date.now() - state.pendingAwayAt <= INTERRUPT_GRACE_MS) {
      state.pendingAwayAt = null;
      beginRound(false, "你回来得很快，我就当你刚刚只是眨了个眼。");
    } else if (state.activeStart || state.interrupted || state.pendingAwayAt) {
      state.activeStart = null;
      state.interrupted = false;
      state.pendingAwayAt = null;
      saveState();
      noticeOpen = true;
      els.modal.classList.add("show");
    } else {
      beginRound(true, "你来了。那我开始做事，你别偷偷跑去别的 App。");
    }
    render();
  </script>
</body>
</html>
